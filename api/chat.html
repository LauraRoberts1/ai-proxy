<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Learning Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f7fa;
    }

    h3 {
      margin-top: 0;
    }

    #chat-box {
      border: 1px solid #ccc;
      padding: 10px;
      height: 350px;
      overflow-y: auto;
      background: #fff;
      border-radius: 8px;
    }

    .msg {
      margin: 6px 0;
      padding: 8px 10px;
      border-radius: 6px;
      max-width: 80%;
      line-height: 1.4;
      font-size: 14px;
    }

    .user {
      background: #d0f0ff;
      margin-left: auto;
      text-align: right;
    }

    .assistant {
      background: #e6e6e6;
      margin-right: auto;
    }

    #input-row {
      display: flex;
      margin-top: 8px;
    }

    #chat-input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px 0 0 6px;
      font-size: 14px;
    }

    #send-btn {
      padding: 10px 16px;
      border: none;
      background: #007ACC;
      color: white;
      border-radius: 0 6px 6px 0;
      cursor: pointer;
      font-size: 14px;
    }

    #send-btn:hover {
      background: #005fa3;
    }
  </style>
</head>

<body>

<h3>AI Learning Assistant</h3>

<div id="chat-box"></div>

<div id="input-row">
  <input id="chat-input" type="text" placeholder="Ask a question or type 'scenario'..." />
  <button id="send-btn">Send</button>
</div>

<script>
const chatBox = document.getElementById("chat-box");
const chatInput = document.getElementById("chat-input");
const sendBtn = document.getElementById("send-btn");

const messages = [
  {
    role: "system",
    content: "You are an AI learning assistant for adult learners. Use plain English, short sentences, Australian spelling. Be clear and supportive. Use scenarios, ask questions, and check understanding. Do not give advice outside learning context."
  }
];

function addMessage(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function startScenario() {
  addMessage("assistant", "Let’s try a quick scenario.");
  addMessage("assistant", "You are supporting a colleague who is feeling overwhelmed at work.");
  addMessage("assistant", "They say: 'I have too much to do and I can’t keep up.'");
  addMessage("assistant", "What would you say?");
}

async function sendMessage() {
  const userText = chatInput.value.trim();
  if (!userText) return;

  addMessage("user", userText);
  messages.push({ role: "user", content: userText });
  chatInput.value = "";

  // trigger scenario mode
  if (userText.toLowerCase().includes("scenario")) {
    startScenario();
    return;
  }

  try {
    const res = await fetch("/api/openai-proxy", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages })
    });

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || "Sorry, something went wrong.";

    addMessage("assistant", reply);
    messages.push({ role: "assistant", content: reply });

  } catch (err) {
    addMessage("assistant", "Error connecting to AI. Try again.");
    console.error(err);
  }
}

sendBtn.addEventListener("click", sendMessage);
chatInput.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

// welcome message
addMessage("assistant", "Hi! I’m your learning assistant.");
addMessage("assistant", "You can ask a question or type 'scenario' to practise.");

</script>

</body>
</html>
